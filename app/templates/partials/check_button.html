{% set cell_id = "cell-" ~ habit_id ~ "-" ~ date_str %}
{% set completed_on_click = 0 if checked else 1 %}
{% set label = "✔" if checked else "✚" %}

<button
  class="btn"
  type="button"
  hx-post="/checks/set"
  hx-target="#{{ cell_id }}"
  hx-swap="innerHTML"
  hx-vals='{"habit_id": {{ habit_id }}, "date": "{{ date_str }}", "completed": {{ completed_on_click }} }'
>
  {{ label }}
</button>
