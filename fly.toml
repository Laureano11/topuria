# fly.toml app configuration file generated for topuria-habits on 2026-03-26T18:15:46-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'topuria-habits'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  SQLITE_PATH = '/data/sqlite.db'
  TZ = 'UTC'

[[mounts]]
  source = 'topuria_sqlite'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 1024
